version: "3.8"

services:
  backend:
    build: ./apps/backend
    ports:
      - "3000:3000"
    env_file: ./apps/backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ai:
    build: ./ai/inference
    ports:
      - "8000:8000"
    env_file: ./ai/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: luna_dev
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luna -d luna_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
